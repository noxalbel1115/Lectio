*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--bf);-webkit-font-smoothing:antialiased}

.toolbar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card);border-bottom:1px solid var(--brd);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}

.search-results{position:absolute;top:100%;left:0;right:0;background:var(--card-s);border:1px solid var(--brd);border-radius:8px;margin-top:4px;max-height:200px;overflow-y:auto;display:none;box-shadow:var(--sh2);z-index:20}

.filter-panel{position:fixed;top:48px;right:0;z-index:9;background:var(--card-s);border-left:1px solid var(--brd);border-bottom:1px solid var(--brd);border-radius:0 0 0 12px;padding:10px 14px;box-shadow:var(--sh2);display:none;max-height:calc(100vh - 60px);overflow-y:auto}

.filter-panel input[type="checkbox"]{accent-color:var(--burg);margin:0}
.filter-panel .edge-section{margin-top:10px;padding-top:8px;border-top:1px solid var(--brd)}

.info-panel{position:fixed;bottom:0;left:0;right:0;z-index:10;background:var(--card-s);border-top:1px solid var(--brd);padding:14px 16px;transform:translateY(100%);transition:transform .25s ease;box-shadow:0 -4px 20px rgba(0,0,0,.1)}

.info-panel .close-btn{position:absolute;top:8px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);line-height:1}
.info-panel .phil-name{font-family:var(--df);font-size:22px;font-weight:700;color:var(--burg);margin:0 0 2px}
.info-panel .phil-dates{font-size:12px;color:var(--muted);margin-bottom:6px}
.info-panel .phil-school{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;margin-bottom:6px}
.info-panel .phil-desc{font-size:14px;color:var(--ink2);line-height:1.5;margin:0}
.info-panel .phil-connections{margin-top:8px;font-size:12px;color:var(--muted)}
.info-panel .phil-connections span{color:var(--ink);font-weight:600}

.legend{position:fixed;bottom:12px;left:12px;z-index:8;background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:8px 12px;box-shadow:var(--sh);font-size:11px;max-width:160px}

  {from:"pitagoras",to:"plotino",type:"influence",label:"inf. neoopitag\u00f3rica"},
  {from:"plotino",to:"porfirio",type:"influence",label:"mestre \u2192 disc\u00edpulo"},
  {from:"porfirio",to:"proclo",type:"influence",label:"tradi\u00e7\u00e3o neooplat\u00f4nica"},
  {from:"empedocles",to:"aristoteles",type:"influence",label:"4 causas materiais"},
  {from:"anaxagoras",to:"aristoteles",type:"influence",label:"causa eficiente"},
  {from:"seneca",to:"epicteto",type:"influence",label:"contempor\u00e2neos est\u00f3icos"},
  {from:"euclides_meg",to:"parmenides",type:"influence",label:"inf. eleata"}
];
// === STATE ===
var canvas=document.getElementById('graphCanvas');
var ctx=canvas.getContext('2d');
var dpr=window.devicePixelRatio||1;
var W,H;
var nodes=[],nodeMap={},edges=[];
var camera={x:0,y:0,zoom:1};
var drag={active:false,node:null,startX:0,startY:0,camX:0,camY:0,moved:false};
var selectedNode=null;
var visibleSchools={};
var showInfluence=true,showOpposition=true;
var simRunning=true,simTicks=0,maxTicks=600;

function initGraph(){
  SCHOOLS.forEach(function(s){visibleSchools[s.id]=true});
  NODES.forEach(function(n,i){
    var angle=i/NODES.length*Math.PI*2;
    var radius=250+Math.random()*100;
    var node={
      id:n.id,name:n.name,dates:n.dates,school:n.school,desc:n.desc,
      color:schoolMap[n.school]?schoolMap[n.school].color:'#888',
      x:Math.cos(angle)*radius+(Math.random()-0.5)*80,
      y:Math.sin(angle)*radius+(Math.random()-0.5)*80,
      vx:0,vy:0,
      radius:0,
      pinned:false
    };
    nodes.push(node);
    nodeMap[node.id]=node;
  });
  EDGES.forEach(function(e){
    if(nodeMap[e.from]&&nodeMap[e.to]){
      edges.push({from:e.from,to:e.to,type:e.type,label:e.label});
    }
  });
}

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

// === PHYSICS ===
function simulate(){
  if(!simRunning)return;
  var repulsion=6000;
  var attraction=0.008;
  var idealLen=160;
  var gravity=0.0008;
  var damping=0.88;
  var cx=0,cy=0;

  for(var i=0;i<nodes.length;i++){
    if(!visibleSchools[nodes[i].school])continue;
    cx+=nodes[i].x;cy+=nodes[i].y;
  }
  var vc=0;
  for(var i=0;i<nodes.length;i++){if(visibleSchools[nodes[i].school])vc++}
  if(vc>0){cx/=vc;cy/=vc}

  for(var i=0;i<nodes.length;i++){
    if(!visibleSchools[nodes[i].school])continue;
    if(nodes[i].pinned)continue;
    for(var j=i+1;j<nodes.length;j++){
      if(!visibleSchools[nodes[j].school])continue;
      var dx=nodes[j].x-nodes[i].x;
      var dy=nodes[j].y-nodes[i].y;
      var dist=Math.sqrt(dx*dx+dy*dy)||1;
      var force=repulsion/(dist*dist);
      var fx=force*dx/dist;
      var fy=force*dy/dist;
      if(!nodes[i].pinned){nodes[i].vx-=fx;nodes[i].vy-=fy}
      if(!nodes[j].pinned){nodes[j].vx+=fx;nodes[j].vy+=fy}
    }
    // Gravity toward center
    nodes[i].vx-=(nodes[i].x-cx)*gravity;
    nodes[i].vy-=(nodes[i].y-cy)*gravity;
  }

  for(var e=0;e<edges.length;e++){
    var a=nodeMap[edges[e].from],b=nodeMap[edges[e].to];
    if(!a||!b)continue;
    if(!visibleSchools[a.school]||!visibleSchools[b.school])continue;
    var dx=b.x-a.x,dy=b.y-a.y;
    var dist=Math.sqrt(dx*dx+dy*dy)||1;
    var force=(dist-idealLen)*attraction;
    var fx=force*dx/dist;
    var fy=force*dy/dist;
    if(!a.pinned){a.vx+=fx;a.vy+=fy}
    if(!b.pinned){b.vx-=fx;b.vy-=fy}
  }

  for(var i=0;i<nodes.length;i++){
    if(nodes[i].pinned)continue;
    if(!visibleSchools[nodes[i].school])continue;
    nodes[i].vx*=damping;
    nodes[i].vy*=damping;
    nodes[i].x+=nodes[i].vx;
    nodes[i].y+=nodes[i].vy;
  }

  simTicks++;
  if(simTicks>maxTicks){
    var totalV=0;
    for(var i=0;i<nodes.length;i++){totalV+=Math.abs(nodes[i].vx)+Math.abs(nodes[i].vy)}
    if(totalV/nodes.length<0.1)simRunning=false;
  }
}

// === RENDERING ===
function screenX(wx){return(wx-camera.x)*camera.zoom+W/2}
function screenY(wy){return(wy-camera.y)*camera.zoom+H/2}
function worldX(sx){return(sx-W/2)/camera.zoom+camera.x}
function worldY(sy){return(sy-H/2)/camera.zoom+camera.y}

function drawArrow(x1,y1,x2,y2,color,dashed,nodeR){
  var dx=x2-x1,dy=y2-y1;
  var dist=Math.sqrt(dx*dx+dy*dy)||1;
  var ux=dx/dist,uy=dy/dist;
  var ex=x2-ux*nodeR,ey=y2-uy*nodeR;
  var sx=x1+ux*(nodeR*0.5),sy=y1+uy*(nodeR*0.5);

  ctx.beginPath();
  if(dashed)ctx.setLineDash([6,4]);
  else ctx.setLineDash([]);
  ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);
  ctx.strokeStyle=color;
  ctx.lineWidth=1.5/camera.zoom<0.5?0.5:1.5;
  ctx.globalAlpha=0.5;
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrowhead
  var aLen=8,aW=4;
  ctx.beginPath();
  ctx.moveTo(ex,ey);
  ctx.lineTo(ex-ux*aLen+uy*aW,ey-uy*aLen-ux*aW);
  ctx.lineTo(ex-ux*aLen-uy*aW,ey-uy*aLen+ux*aW);
  ctx.closePath();
  ctx.fillStyle=color;
  ctx.fill();
  ctx.globalAlpha=1;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();

  var isDark=document.documentElement.getAttribute('data-theme')==='dark';
  var bgCol=isDark?'#1a1410':'#faf6ef';
  ctx.fillStyle=bgCol;
  ctx.fillRect(0,0,W,H);

  // Draw edges
  for(var i=0;i<edges.length;i++){
    var e=edges[i];
    var a=nodeMap[e.from],b=nodeMap[e.to];
    if(!a||!b)continue;
    if(!visibleSchools[a.school]||!visibleSchools[b.school])continue;
    if(e.type==='influence'&&!showInfluence)continue;
    if(e.type==='opposition'&&!showOpposition)continue;

    var ax=screenX(a.x),ay=screenY(a.y);
    var bx=screenX(b.x),by=screenY(b.y);
    var nodeR=(selectedNode?14:12)*camera.zoom;

    var isHighlighted=selectedNode&&(e.from===selectedNode.id||e.to===selectedNode.id);
    var edgeColor;
    if(e.type==='opposition'){
      edgeColor=isDark?'#d47070':'#c0392b';
    }else{
      edgeColor=isDark?'#8b7d6b':'#999';
    }

    if(selectedNode&&!isHighlighted){
      ctx.globalAlpha=0.08;
    }

    drawArrow(ax,ay,bx,by,isHighlighted?(e.type==='opposition'?(isDark?'#ff8888':'#e74c3c'):'#b8860b'):edgeColor,e.type==='opposition',nodeR);
    ctx.globalAlpha=1;

    // Edge label on hover/select
    if(isHighlighted&&camera.zoom>0.5){
      var mx=(ax+bx)/2,my=(ay+by)/2;
      ctx.font='10px '+getComputedStyle(document.documentElement).getPropertyValue('--bf');
      ctx.fillStyle=isDark?'#c4b8a8':'#4a3428';
      ctx.textAlign='center';
      ctx.globalAlpha=0.85;
      ctx.fillText(e.label,mx,my-6);
      ctx.globalAlpha=1;
    }
  }

  // Draw nodes
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];
    if(!visibleSchools[n.school])continue;

    var sx=screenX(n.x),sy=screenY(n.y);
    var r=12*camera.zoom;
    n.radius=r;

    var isSelected=selectedNode&&selectedNode.id===n.id;
    var isConnected=false;
    if(selectedNode&&!isSelected){
      for(var e=0;e<edges.length;e++){
        if((edges[e].from===selectedNode.id&&edges[e].to===n.id)||(edges[e].to===selectedNode.id&&edges[e].from===n.id)){
          isConnected=true;break;
        }
      }
    }

    if(selectedNode&&!isSelected&&!isConnected){
      ctx.globalAlpha=0.15;
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(sx,sy,r,0,Math.PI*2);
    ctx.fillStyle=n.color;
    ctx.fill();

    if(isSelected){
      ctx.lineWidth=3;
      ctx.strokeStyle=isDark?'#e8ddd0':'#2c1810';
      ctx.stroke();
    }else if(isConnected){
      ctx.lineWidth=2;
      ctx.strokeStyle=isDark?'#c4b8a8':'#4a3428';
      ctx.stroke();
    }

    // Label
    if(camera.zoom>0.35){
      var fontSize=Math.max(10,Math.min(14,12*camera.zoom));
      ctx.font=(isSelected?'700 ':'500 ')+fontSize+'px '+getComputedStyle(document.documentElement).getPropertyValue('--df');
      ctx.textAlign='center';
      ctx.textBaseline='top';
      ctx.fillStyle=isDark?'#e8ddd0':'#2c1810';

      // Text background
      var tw=ctx.measureText(n.name).width;
      ctx.fillStyle=bgCol;
      ctx.globalAlpha=selectedNode&&!isSelected&&!isConnected?0.15:0.75;
      ctx.fillRect(sx-tw/2-3,sy+r+2,tw+6,fontSize+4);
      ctx.globalAlpha=selectedNode&&!isSelected&&!isConnected?0.15:1;

      ctx.fillStyle=isDark?'#e8ddd0':'#2c1810';
      ctx.fillText(n.name,sx,sy+r+4);
    }

    ctx.globalAlpha=1;
  }

  ctx.restore();
}

// === INTERACTION ===
function getNodeAt(mx,my){
  var wx=worldX(mx),wy=worldY(my);
  var best=null,bestDist=Infinity;
  for(var i=nodes.length-1;i>=0;i--){
    if(!visibleSchools[nodes[i].school])continue;
    var dx=nodes[i].x-wx,dy=nodes[i].y-wy;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<20/camera.zoom&&dist<bestDist){
      best=nodes[i];bestDist=dist;
    }
  }
  return best;
}

function showInfo(node){
  selectedNode=node;
  var p=document.getElementById('infoPanel');
  document.getElementById('infoName').textContent=node.name;
  document.getElementById('infoDates').textContent=node.dates;
  var sch=schoolMap[node.school];
  var schEl=document.getElementById('infoSchool');
  schEl.textContent=sch?sch.name:node.school;
  schEl.style.background=node.color+'22';
  schEl.style.color=node.color;
  document.getElementById('infoDesc').textContent=node.desc;

  // Connections
  var conns=[];
  edges.forEach(function(e){
    if(e.from===node.id){
      var t=nodeMap[e.to];
      if(t)conns.push('\u2192 '+t.name+' ('+e.label+')');
    }
    if(e.to===node.id){
      var f=nodeMap[e.from];
      if(f)conns.push('\u2190 '+f.name+' ('+e.label+')');
    }
  });
  document.getElementById('infoConn').innerHTML='<span>'+conns.length+' conex\u00f5es:</span> '+conns.join('; ');
  p.classList.add('show');
}

function hideInfo(){
  selectedNode=null;
  document.getElementById('infoPanel').classList.remove('show');
}

canvas.addEventListener('mousedown',function(ev){
  var rect=canvas.getBoundingClientRect();
  var mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
  var node=getNodeAt(mx,my);
  drag.active=true;
  drag.moved=false;
  drag.startX=mx;drag.startY=my;
  if(node){
    drag.node=node;
    node.pinned=true;
    simRunning=true;simTicks=0;
  }else{
    drag.node=null;
    drag.camX=camera.x;drag.camY=camera.y;
  }
});

canvas.addEventListener('mousemove',function(ev){
  var rect=canvas.getBoundingClientRect();
  var mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
  if(!drag.active){
    var node=getNodeAt(mx,my);
    canvas.style.cursor=node?'pointer':'grab';
    return;
  }
  var dx=mx-drag.startX,dy=my-drag.startY;
  if(Math.abs(dx)>3||Math.abs(dy)>3)drag.moved=true;
  if(drag.node){
    drag.node.x=worldX(mx);
    drag.node.y=worldY(my);
  }else{
    camera.x=drag.camX-dx/camera.zoom;
    camera.y=drag.camY-dy/camera.zoom;
  }
});

canvas.addEventListener('mouseup',function(ev){
  if(drag.node){
    drag.node.pinned=false;
  }
  if(!drag.moved){
    var rect=canvas.getBoundingClientRect();
    var mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
    var node=getNodeAt(mx,my);
    if(node){showInfo(node)}
    else{hideInfo()}
  }
  drag.active=false;drag.node=null;
});

canvas.addEventListener('wheel',function(ev){
  ev.preventDefault();
  var rect=canvas.getBoundingClientRect();
  var mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
  var wx=worldX(mx),wy=worldY(my);
  var delta=ev.deltaY>0?0.9:1.1;
  camera.zoom=Math.max(0.15,Math.min(5,camera.zoom*delta));
  camera.x=wx-(mx-W/2)/camera.zoom;
  camera.y=wy-(my-H/2)/camera.zoom;
},{passive:false});

// Touch support
var touches={};
canvas.addEventListener('touchstart',function(ev){
  ev.preventDefault();
  if(ev.touches.length===1){
    var t=ev.touches[0];
    var rect=canvas.getBoundingClientRect();
    var mx=t.clientX-rect.left,my=t.clientY-rect.top;
    var node=getNodeAt(mx,my);
    drag.active=true;drag.moved=false;
    drag.startX=mx;drag.startY=my;
    if(node){drag.node=node;node.pinned=true;simRunning=true;simTicks=0}
    else{drag.node=null;drag.camX=camera.x;drag.camY=camera.y}
  }
  if(ev.touches.length===2){
    touches.dist=Math.hypot(ev.touches[0].clientX-ev.touches[1].clientX,ev.touches[0].clientY-ev.touches[1].clientY);
    touches.zoom=camera.zoom;
  }
},{passive:false});

canvas.addEventListener('touchmove',function(ev){
  ev.preventDefault();
  if(ev.touches.length===1&&drag.active){
    var t=ev.touches[0];
    var rect=canvas.getBoundingClientRect();
    var mx=t.clientX-rect.left,my=t.clientY-rect.top;
    var dx=mx-drag.startX,dy=my-drag.startY;
    if(Math.abs(dx)>3||Math.abs(dy)>3)drag.moved=true;
    if(drag.node){drag.node.x=worldX(mx);drag.node.y=worldY(my)}
    else{camera.x=drag.camX-dx/camera.zoom;camera.y=drag.camY-dy/camera.zoom}
  }
  if(ev.touches.length===2){
    var d=Math.hypot(ev.touches[0].clientX-ev.touches[1].clientX,ev.touches[0].clientY-ev.touches[1].clientY);
    camera.zoom=Math.max(0.15,Math.min(5,touches.zoom*(d/touches.dist)));
  }
},{passive:false});

canvas.addEventListener('touchend',function(ev){
  if(drag.node)drag.node.pinned=false;
  if(!drag.moved&&drag.active){
    var rect=canvas.getBoundingClientRect();
    if(ev.changedTouches.length>0){
      var t=ev.changedTouches[0];
      var mx=t.clientX-rect.left,my=t.clientY-rect.top;
      var node=getNodeAt(mx,my);
      if(node)showInfo(node);else hideInfo();
    }
  }
  drag.active=false;drag.node=null;
});

// === SEARCH ===
var searchInput=document.getElementById('searchInput');
var searchResults=document.getElementById('searchResults');

searchInput.addEventListener('input',function(){
  var q=this.value.toLowerCase().trim();
  searchResults.innerHTML='';
  if(q.length<1){searchResults.classList.remove('show');return}
  var matches=NODES.filter(function(n){return n.name.toLowerCase().indexOf(q)!==-1});
  if(matches.length===0){searchResults.classList.remove('show');return}
  matches.slice(0,8).forEach(function(n){
    var d=document.createElement('div');
    var sch=schoolMap[n.school];
    d.innerHTML=n.name+'<span class="school-tag">'+(sch?sch.name:'')+'</span>';
    d.addEventListener('click',function(){
      var node=nodeMap[n.id];
      if(node){
        camera.x=node.x;camera.y=node.y;
        camera.zoom=1.5;
        showInfo(node);
      }
      searchResults.classList.remove('show');
      searchInput.value='';
    });
    searchResults.appendChild(d);
  });
  searchResults.classList.add('show');
});

searchInput.addEventListener('blur',function(){
  setTimeout(function(){searchResults.classList.remove('show')},200);
});

// === FILTER PANEL ===
function buildFilterPanel(){
  var fp=document.getElementById('filterPanel');
  var html='<h3>Escolas</h3>';
  SCHOOLS.forEach(function(s){
    html+='<label><input type="checkbox" checked data-school="'+s.id+'"><span class="swatch" style="background:'+s.color+'"></span>'+s.name+'</label>';
  });
  html+='<div class="edge-section"><h3>Arestas</h3>';
  html+='<label><input type="checkbox" checked id="chkInfluence"> Influ\u00eancia</label>';
  html+='<label><input type="checkbox" checked id="chkOpposition"> Oposi\u00e7\u00e3o</label>';
  html+='</div>';
  fp.innerHTML=html;

  fp.querySelectorAll('input[data-school]').forEach(function(cb){
    cb.addEventListener('change',function(){
      visibleSchools[this.getAttribute('data-school')]=this.checked;
      simRunning=true;simTicks=0;
    });
  });
  document.getElementById('chkInfluence').addEventListener('change',function(){showInfluence=this.checked});
  document.getElementById('chkOpposition').addEventListener('change',function(){showOpposition=this.checked});
}

document.getElementById('filterBtn').addEventListener('click',function(){
  document.getElementById('filterPanel').classList.toggle('show');
});

document.getElementById('closeInfo').addEventListener('click',hideInfo);

document.getElementById('resetBtn').addEventListener('click',function(){
  camera={x:0,y:0,zoom:1};
  hideInfo();
  simRunning=true;simTicks=0;
  nodes.forEach(function(n){n.pinned=false});
});

// === THEME ===
function syncTheme(){
  try{
    var s=JSON.parse(localStorage.getItem('lectio_v2')||'{}');
    if(s.theme==='dark')document.documentElement.setAttribute('data-theme','dark');
  }catch(e){}
}
function toggleTheme(){
  var d=document.documentElement;
  var t=d.getAttribute('data-theme')==='dark'?null:'dark';
  if(t)d.setAttribute('data-theme','dark');else d.removeAttribute('data-theme');
  try{
    var s=JSON.parse(localStorage.getItem('lectio_v2')||'{}');
    s.theme=t||'light';
    localStorage.setItem('lectio_v2',JSON.stringify(s));
  }catch(e){}
  document.getElementById('thBtn').textContent=t?'\u2600':'\u263E';
}
syncTheme();
if(document.documentElement.getAttribute('data-theme')==='dark')document.getElementById('thBtn').textContent='\u2600';

// === MAIN LOOP ===
initGraph();
buildFilterPanel();
resize();
window.addEventListener('resize',resize);

function loop(){
  simulate();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
